services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        S3_ENDPOINT: ${S3_ENDPOINT}
        S3_ACCESS_KEY: ${S3_ACCESS_KEY}
        S3_SECRET_KEY: ${S3_SECRET_KEY}
        S3_BUCKET: ${S3_BUCKET}
        S3_REGION: ${S3_REGION}
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
